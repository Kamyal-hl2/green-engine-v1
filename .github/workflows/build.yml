name: Build Android Engine

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y python3 git build-essential wget unzip \
            libbz2-dev libbz2-dev:i386 libsdl2-dev libfreetype6-dev libfontconfig1-dev \
            libopenal-dev libjpeg-dev libpng-dev libcurl4-gnutls-dev \
            libedit-dev pkg-config g++-multilib libc6-dev-i386

      - name: Cache NDK
        id: cache-ndk
        uses: actions/cache@v4
        with:
          path: ndk/android-ndk-r10e
          key: android-ndk-r10e-v2

      - name: Download NDK
        if: steps.cache-ndk.outputs.cache-hit != 'true'
        run: |
          mkdir -p ndk
          cd ndk
          wget -q --timeout=60 --tries=3 https://dl.google.com/android/repository/android-ndk-r10e-linux-x86_64.zip -O ndk.zip
          unzip -q ndk.zip
          rm ndk.zip

      - name: Configure WAF
        working-directory: engine
        run: |
          export ANDROID_NDK_HOME="${{ github.workspace }}/ndk/android-ndk-r10e"
          export PATH=$PATH:$ANDROID_NDK_HOME/toolchains/arm-linux-androideabi-4.9/prebuilt/linux-x86_64/bin
          export CFLAGS="-m32 -I/usr/include"
          export LDFLAGS="-m32 -L/usr/lib/i386-linux-gnu"
          python3 waf configure -v -T release --togles --android=armeabi-v7a-hard,4.9,21

      - name: Build engine
        working-directory: engine
        run: |
          export ANDROID_NDK_HOME="${{ github.workspace }}/ndk/android-ndk-r10e"
          export PATH=$PATH:$ANDROID_NDK_HOME/toolchains/arm-linux-androideabi-4.9/prebuilt/linux-x86_64/bin
          python3 waf build -v -j$(nproc)

      - name: Collect artifacts
        run: |
          mkdir -p artifacts
          find engine/build -iname "*.so" -exec cp {} artifacts/ \; 2>/dev/null || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: engine-so-files
          path: artifacts/
          if-no-files-found: warn

      - name: Upload logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: engine/build/config.log
